name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  # ── Serviço 1: Log-Ingestion-and-Metrics ─────────────────────────────────
  test-log-ingestion:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Log-Ingestion-and-Metrics
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Log-Ingestion-and-Metrics/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (≥85% coverage required)
        run: pytest

  # ── Serviço 2: Incident-Response-Agent ───────────────────────────────────
  test-incident-agent:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: "test-key"
      API_KEY: ""
    defaults:
      run:
        working-directory: Incident-Response-Agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Incident-Response-Agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (≥85% coverage required)
        run: pytest

  # ── Serviço 3: Knowledge-Base ─────────────────────────────────────────────
  # Usa requirements-test.txt — exclui sentence-transformers/torch (~800 MB)
  # que são mockados via sys.modules em tests/conftest.py.
  test-knowledge-base:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Knowledge-Base
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: Knowledge-Base/requirements-test.txt

      - name: Install test dependencies (sem ML packages)
        run: pip install -r requirements-test.txt

      - name: Run tests (≥85% coverage required)
        run: pytest

  # ── Docker build gate ─────────────────────────────────────────────────────
  # Garante que todas as imagens compilam após os testes passarem.
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-log-ingestion, test-incident-agent, test-knowledge-base]
    steps:
      - uses: actions/checkout@v4

      - name: Build all service images
        run: docker compose build --parallel
