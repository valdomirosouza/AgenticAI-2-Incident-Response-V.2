name: agenticai-incident-response

# Redes isoladas por responsabilidade (SDD §9.2.2)
# ingestion-net: Log-Ingestion ↔ Redis
# agent-net:     Agent ↔ Log-Ingestion ↔ Knowledge-Base
# kb-net:        Knowledge-Base ↔ Qdrant
networks:
  ingestion-net:
  agent-net:
  kb-net:
  observability-net:

volumes:
  qdrant-storage:
  grafana-data:
  prometheus-data:

services:
  # ──────────────────────────────────────────────────────────
  # Serviço 1 — Log-Ingestion-and-Metrics (:8000)
  # ──────────────────────────────────────────────────────────
  log-ingestion:
    build:
      context: ./Log-Ingestion-and-Metrics
      dockerfile: Dockerfile
    container_name: log-ingestion
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-}
      ENABLE_DOCS: ${ENABLE_DOCS:-true}
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ingestion-net
      - agent-net # Exposto ao agent para consultas de métricas
      - observability-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Serviço 2 — Incident-Response-Agent (:8001)
  # ──────────────────────────────────────────────────────────
  incident-response-agent:
    build:
      context: ./Incident-Response-Agent
      dockerfile: Dockerfile
    container_name: incident-response-agent
    ports:
      - "8001:8001"
    environment:
      APP_ENV: ${APP_ENV:-development}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      API_KEY: ${API_KEY:-}
      METRICS_API_URL: http://log-ingestion:8000
      KB_API_URL: http://knowledge-base:8002
      KB_API_KEY: ${API_KEY:-}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-}
      ENABLE_DOCS: ${ENABLE_DOCS:-true}
      LATENCY_P99_THRESHOLD_MS: ${LATENCY_P99_THRESHOLD_MS:-1000}
      ERROR_RATE_5XX_THRESHOLD_PCT: ${ERROR_RATE_5XX_THRESHOLD_PCT:-1.0}
    env_file:
      - .env
    depends_on:
      log-ingestion:
        condition: service_healthy
      knowledge-base:
        condition: service_healthy
    networks:
      - agent-net
      - observability-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Serviço 3 — Knowledge-Base (:8002)
  # ──────────────────────────────────────────────────────────
  knowledge-base:
    build:
      context: ./Knowledge-Base
      dockerfile: Dockerfile
    container_name: knowledge-base
    ports:
      - "8002:8002"
    environment:
      APP_ENV: ${APP_ENV:-development}
      API_KEY: ${API_KEY:-}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      OTLP_ENDPOINT: ${OTLP_ENDPOINT:-}
      ENABLE_DOCS: ${ENABLE_DOCS:-true}
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - agent-net
      - kb-net
      - observability-net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Redis 7 — Store de métricas em tempo real
  # Acessível APENAS pela rede ingestion-net (não pelo agent)
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    # --requirepass is only injected when REDIS_PASSWORD is non-empty to avoid
    # redis-server consuming the next flag as the password value on empty expansion
    command: >
      sh -c 'exec redis-server
      $${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""'
    ports:
      - "6379:6379"
    networks:
      - ingestion-net
    healthcheck:
      # CMD-SHELL permite expansão de parâmetro: passa -a apenas se REDIS_PASSWORD não-vazio
      test:
        ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Qdrant v1.18.0 — Vector DB para Knowledge Base
  # Acessível APENAS pela rede kb-net
  # ──────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.18.0
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334" # gRPC
    volumes:
      - qdrant-storage:/qdrant/storage
    # QDRANT__SERVICE__API_KEY intentionally omitted: setting it to "" enables auth
    # with an empty key and breaks the client. Set QDRANT_API_KEY in .env for prod.
    networks:
      - kb-net
    healthcheck:
      # qdrant:v1.18.0 image has no curl/wget — use bash /dev/tcp to check port
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────
  # Observabilidade — Prometheus + Grafana
  # ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alerts.yaml:/etc/prometheus/alerts.yaml:ro
      - prometheus-data:/prometheus
    networks:
      - observability-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    networks:
      - observability-net
    restart: unless-stopped
